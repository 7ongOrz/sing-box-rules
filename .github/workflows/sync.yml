name: Config Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '20 18 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - name: "Setup sing-box"
      env:
        SING_BOX_DEB_URL: "https://github.com/SagerNet/sing-box/releases/download/v1.9.0/sing-box_1.9.0_linux_amd64.deb"
      run: |
          set -Eeuo pipefail
          wget -O sing-box.deb $SING_BOX_DEB_URL
          sudo dpkg -i sing-box.deb
    - name: Set up Python3
      uses: actions/setup-python@v6
      with:
        python-version: 3.x
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests pyyaml
    - name: Prepare output directory
      run: mkdir -p ./rule
    - name: Run script
      run: python ../main.py
      working-directory: ./rule/
    - name: Check rule changes
      id: diff
      run: |
        skip=false
        if git fetch origin release; then
          mkdir -p current-release
          git archive --format=tar origin/release | tar -xf - -C current-release
          diff -qr ./rule ./current-release >/dev/null && skip=true
        fi
        echo "skip=$skip" >> $GITHUB_OUTPUT
    - name: Publish rule files
      if: steps.diff.outputs.skip != 'true'
      run: |
        mkdir -p publish
        cp ./rule/*.json ./rule/*.srs ./publish/
        cd publish
        git init
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git branch -M release
        git add .
        git commit -m "Update rules"
        git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        git push -f origin release
